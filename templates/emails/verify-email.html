<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>Verify your email</title>
  <style>
    :root {
      color-scheme: dark;
      supported-color-schemes: dark;
    }

    body,
    .email-bg,
    .email-shell {
      background-color: #030507 !important;
      color: #f8fafc !important;
    }

    .email-card {
      background-color: #0b1017 !important;
      border: 1px solid #202a3a !important;
      border-radius: 16px !important;
    }

    .email-surface {
      background-color: #101722 !important;
      border: 1px solid #202a3a !important;
    }

    .email-text {
      color: #f8fafc !important;
    }

    .email-muted {
      color: #8f9bb0 !important;
    }

    .email-accent {
      color: #4562ff !important;
    }

    .email-divider {
      background-color: #202a3a !important;
    }

    .email-button-cell {
      background-color: #4562ff !important;
      border-radius: 10px !important;
    }

    .email-button-link {
      display: block !important;
      padding: 14px 36px !important;
      border: 1px solid #4562ff !important;
      border-radius: 10px !important;
      color: #ffffff !important;
      font-size: 15px !important;
      font-weight: 700 !important;
      letter-spacing: 0.2px !important;
      text-decoration: none !important;
    }

    .email-logo-wrap {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid #202a3a;
      border-radius: 999px;
      background-color: #0b1017;
    }

    a[x-apple-data-detectors],
    #MessageViewBody a,
    u + .body a {
      color: inherit !important;
      text-decoration: none !important;
      font: inherit !important;
    }

    @media (prefers-color-scheme: dark) {
      body,
      .email-bg,
      .email-shell {
        background-color: #030507 !important;
        color: #f8fafc !important;
      }

      .email-card {
        background-color: #0b1017 !important;
        border-color: #202a3a !important;
      }

      .email-surface {
        background-color: #101722 !important;
        border-color: #202a3a !important;
      }

      .email-text {
        color: #f8fafc !important;
      }

      .email-muted {
        color: #8f9bb0 !important;
      }

      .email-accent {
        color: #6f84ff !important;
      }

      .email-divider {
        background-color: #202a3a !important;
      }

      .email-button-cell {
        background-color: #4562ff !important;
      }

      .email-button-link {
        border-color: #4562ff !important;
        color: #ffffff !important;
      }
    }

    [data-ogsc] .email-bg,
    [data-ogsb] .email-bg,
    [data-ogsc] .email-shell,
    [data-ogsb] .email-shell {
      background-color: #030507 !important;
      color: #f8fafc !important;
    }

    [data-ogsc] .email-card,
    [data-ogsb] .email-card {
      background-color: #0b1017 !important;
      border-color: #202a3a !important;
    }

    [data-ogsc] .email-surface,
    [data-ogsb] .email-surface {
      background-color: #101722 !important;
      border-color: #202a3a !important;
    }

    [data-ogsc] .email-text,
    [data-ogsb] .email-text {
      color: #f8fafc !important;
    }

    [data-ogsc] .email-muted,
    [data-ogsb] .email-muted {
      color: #8f9bb0 !important;
    }

    [data-ogsc] .email-accent,
    [data-ogsb] .email-accent {
      color: #6f84ff !important;
    }

    [data-ogsc] .email-divider,
    [data-ogsb] .email-divider {
      background-color: #202a3a !important;
    }

    [data-ogsc] .email-button-cell,
    [data-ogsb] .email-button-cell {
      background-color: #4562ff !important;
    }

    [data-ogsc] .email-button-link,
    [data-ogsb] .email-button-link {
      border-color: #4562ff !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body class="body email-bg" style="margin:0;padding:0;background-color:#030507;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="email-bg email-shell" bgcolor="#030507" style="background-color:#030507;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">
          <tr>
            <td style="padding-bottom:32px;" align="center">
              <div class="email-logo-wrap" style="display:inline-block;padding:10px 18px;border:1px solid #202a3a;border-radius:999px;background-color:#0b1017;">
                <img src="{{ logo_url }}" alt="FX Journal" height="36" style="display:block;" />
              </div>
            </td>
          </tr>
          <tr>
            <td class="email-card" bgcolor="#0b1017" style="background-color:#0b1017;border-radius:16px;padding:40px 36px;border:1px solid #202a3a;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
                <tr>
                  <td align="center">
                    <div class="email-surface email-accent" style="display:inline-block;padding:10px 14px;border-radius:999px;background-color:#101722;border:1px solid #202a3a;font-size:12px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#4562ff;">Email verification</div>
                  </td>
                </tr>
              </table>
              <p class="email-text" style="margin:0 0 8px 0;font-size:24px;font-weight:700;color:#f8fafc;letter-spacing:-0.3px;text-align:center;">Verify your email</p>
              <p class="email-muted" style="margin:0 0 28px 0;font-size:15px;color:#8f9bb0;line-height:1.7;text-align:center;">Hey {{ name }}, almost there. Confirm your email address to activate your FX Journal account.</p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td class="email-button-cell" bgcolor="#4562ff" align="center" style="background-color:#4562ff;border-radius:10px;">
                          <a href="{{ verify_url }}" class="email-button-link" style="display:block;padding:14px 36px;border:1px solid #4562ff;border-radius:10px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:0.2px;">Verify Email</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
                <tr><td class="email-divider" style="height:1px;background-color:#202a3a;"></td></tr>
              </table>
              <p class="email-muted" style="margin:0 0 8px 0;font-size:13px;color:#8f9bb0;text-align:center;line-height:1.6;">This link expires in <strong class="email-text" style="color:#f8fafc;">24 hours</strong>.</p>
              <p class="email-muted" style="margin:0;font-size:13px;color:#8f9bb0;text-align:center;line-height:1.6;">If you did not create an account, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding-top:28px;" align="center">
              <p class="email-muted" style="margin:0;font-size:12px;color:#8f9bb0;">
                <a href="https://myfxjournal.com" class="email-accent" style="color:#4562ff;text-decoration:none;">myfxjournal.com</a>
                &nbsp;&middot;&nbsp;
                <a href="mailto:support@myfxjournal.com" class="email-muted" style="color:#8f9bb0;text-decoration:none;">support@myfxjournal.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
